<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CalcProg">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <title>Calc Prog Jarvis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desactivar selección de texto e interacciones web */
        body { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            overflow: hidden; /* Evitar scroll elástico de la página entera */
            /* Usar el negro puro de iOS en modo oscuro */
            background-color: #000000;
        }

        /* Variables de Safe Area de Apple para CSS puro */
        :root {
            --sab: env(safe-area-inset-bottom);
            --sat: env(safe-area-inset-top);
        }

        /* Contenedor principal respetando Safe Areas */
        .ios-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            /* El padding top debe ser al menos el safe area del notch */
            padding-top: calc(var(--sat) + 10px);
            /* El padding bottom debe ser el safe area del home indicator */
            padding-bottom: var(--sab);
            box-sizing: border-box;
        }

        /* Ocultar barra de scroll para el binario largo */
        ::-webkit-scrollbar { display: none; }

        /* Estilo nativo para botones iOS activados */
        button:active {
            opacity: 0.6;
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans">

    <div class="ios-container px-5">
        
        <div class="bg-gray-900 rounded-3xl p-4 mb-4 shadow-xl border border-gray-800">
            <div id="history-log" class="text-xs text-gray-600 font-mono h-24 overflow-y-auto space-y-1 text-right flex-col-reverse flex">
                </div>
            <div id="current-op" class="text-orange-400 text-base h-7 text-right font-mono mt-3 font-medium tracking-tight break-words overflow-hidden"></div>
        </div>

        <div class="flex flex-col justify-end space-y-3 mb-6 flex-1 px-1">
            <div id="row-16" class="flex items-center cursor-pointer p-3 rounded-2xl transition-colors border border-transparent" onclick="setBase(16)">
                <div class="text-xs font-bold text-gray-600 w-14">HEX</div>
                <div id="val-16" class="text-3xl font-mono text-right flex-1 break-all text-gray-400">0</div>
            </div>
            <div id="row-10" class="flex items-center cursor-pointer p-3 rounded-2xl transition-colors border border-transparent" onclick="setBase(10)">
                <div class="text-xs font-bold text-gray-600 w-14">DEC</div>
                <div id="val-10" class="text-3xl font-mono text-right flex-1 break-all text-gray-400">0</div>
            </div>
            <div id="row-2" class="flex items-center cursor-pointer p-3 rounded-2xl transition-colors border border-transparent" onclick="setBase(2)">
                <div class="text-xs font-bold text-gray-600 w-14">BIN</div>
                <div id="val-2" class="text-xl font-mono text-right flex-1 break-words text-gray-400 tracking-wider max-h-24 overflow-y-auto leading-relaxed">0000</div>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-3 pb-6">
            <button class="btn-op bg-gray-900 text-orange-400 font-bold py-3 rounded-2xl text-xl" onclick="setOp('<<')">&lt;&lt;</button>
            <button class="btn-op bg-gray-900 text-orange-400 font-bold py-3 rounded-2xl text-xl" onclick="setOp('>>')">&gt;&gt;</button>
            <button class="btn-op bg-gray-900 text-orange-400 font-semibold py-3 rounded-2xl text-sm" onclick="setOp('&')">AND</button>
            <button class="btn-op bg-gray-900 text-orange-400 font-semibold py-3 rounded-2xl text-sm" onclick="setOp('|')">OR</button>
            <button class="btn-op bg-gray-900 text-orange-400 font-semibold py-3 rounded-2xl text-sm" onclick="setOp('^')">XOR</button>

            <button class="btn-hex bg-gray-900 text-white py-4 rounded-2xl font-mono text-xl" onclick="inputChar('A')">A</button>
            <button class="bg-gray-700 text-red-400 font-bold py-4 rounded-2xl font-mono text-sm" onclick="clearAll()">AC</button>
            <button class="bg-gray-700 text-red-400 font-bold py-4 rounded-2xl font-mono text-sm" onclick="deleteLast()">DEL</button>
            <button class="btn-op bg-gray-900 text-orange-400 text-3xl rounded-2xl" onclick="setOp('/')">÷</button>
            <button class="btn-op bg-gray-900 text-orange-400 text-3xl rounded-2xl" onclick="setOp('*')">×</button>

            <button class="btn-hex bg-gray-900 text-white py-4 rounded-2xl font-mono text-xl" onclick="inputChar('B')">B</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('7')">7</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('8')">8</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('9')">9</button>
            <button class="btn-op bg-gray-900 text-orange-400 text-4xl rounded-2xl" onclick="setOp('-')">−</button>

            <button class="btn-hex bg-gray-900 text-white py-4 rounded-2xl font-mono text-xl" onclick="inputChar('C')">C</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('4')">4</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('5')">5</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('6')">6</button>
            <button class="btn-op bg-gray-900 text-orange-400 text-3xl rounded-2xl" onclick="setOp('+')">+</button>

            <button class="btn-hex bg-gray-900 text-white py-4 rounded-2xl font-mono text-xl" onclick="inputChar('D')">D</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('1')">1</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('2')">2</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl" onclick="inputChar('3')">3</button>
            <button class="bg-orange-500 text-white text-4xl rounded-3xl row-span-2 shadow-lg" onclick="calculate()">=</button>

            <button class="btn-hex bg-gray-900 text-white py-4 rounded-2xl font-mono text-xl" onclick="inputChar('E')">E</button>
            <button class="btn-hex bg-gray-900 text-white py-4 rounded-2xl font-mono text-xl" onclick="inputChar('F')">F</button>
            <button class="btn-num bg-gray-800 text-white py-5 rounded-full text-3xl col-span-2" onclick="inputChar('0')">0</button>
        </div>

    </div>

    <script>
        let activeBase = 10;
        let currentInput = "0"; 
        let expression = []; 
        let waitingForNewInput = false;
        let history = []; 

        const row16 = document.getElementById('row-16');
        const row10 = document.getElementById('row-10');
        const row2 = document.getElementById('row-2');
        const val16 = document.getElementById('val-16');
        const val10 = document.getElementById('val-10');
        const val2 = document.getElementById('val-2');
        const currentOpDisplay = document.getElementById('current-op');
        const historyLogDisplay = document.getElementById('history-log');

        setBase(10);

        function formatBigInt(val, base) {
            if (val === null) return "";
            let isNeg = val < 0n;
            let absVal = isNeg ? -val : val;
            let str = absVal.toString(base).toUpperCase();
            if (base === 2) str = formatBinary(str);
            return (isNeg ? "-" : "") + str;
        }

        function renderContextUI() {
            let exprStr = expression.map(item => {
                if (typeof item === 'bigint') return formatBigInt(item, activeBase);
                // Mapeo visual de operadores
                if (item === '*') return '×';
                if (item === '/') return '÷';
                if (item === '-') return '−';
                return item;
            }).join(' ');

            if (!waitingForNewInput && currentInput !== "0" && currentInput !== "" && currentInput !== "-") {
                let currentVal = parseCurrentInput();
                if (currentVal !== null) {
                    exprStr += (exprStr ? " " : "") + formatBigInt(currentVal, activeBase);
                }
            }

            currentOpDisplay.innerText = exprStr;

            historyLogDisplay.innerHTML = "";
            // Usamos flex-col-reverse, así que iteramos normal pero se verán al revés (más nuevo abajo)
            history.forEach(entry => {
                let histStr = entry.expr.map(item => {
                    if (typeof item === 'bigint') return formatBigInt(item, activeBase);
                    if (item === '*') return '×';
                    if (item === '/') return '÷';
                    if (item === '-') return '−';
                    return item;
                }).join(' ');
                histStr += " = " + formatBigInt(entry.res, activeBase);
                let div = document.createElement('div');
                div.innerText = histStr;
                historyLogDisplay.appendChild(div);
            });
        }

        function setBase(base) {
            activeBase = base;
            
            // Colores nativos de iOS (fondo gris oscuro para selección)
            [row16, row10, row2].forEach(row => {
                row.classList.remove('bg-gray-800', 'border-gray-700');
                row.querySelector('div:nth-child(2)')?.classList.replace('text-white', 'text-gray-400');
            });

            let activeRow = base === 16 ? row16 : (base === 10 ? row10 : row2);
            activeRow.classList.add('bg-gray-800', 'border-gray-700');
            activeRow.querySelector('div:nth-child(2)')?.classList.replace('text-gray-400', 'text-white');

            const hexBtns = document.querySelectorAll('.btn-hex');
            const numBtns = document.querySelectorAll('.btn-num');

            hexBtns.forEach(btn => btn.disabled = base !== 16);
            hexBtns.forEach(btn => btn.style.opacity = base !== 16 ? '0.2' : '1');

            numBtns.forEach(btn => {
                const isBinBtn = btn.innerText === '0' || btn.innerText === '1';
                if (base === 2 && !isBinBtn) {
                    btn.disabled = true;
                    btn.style.opacity = '0.2';
                } else {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }
            });

            let currentBigInt = parseCurrentInput();
            if(currentBigInt !== null) {
                currentInput = formatBigInt(currentBigInt, base).replace(/\s/g, ''); 
            } else {
                currentInput = "0";
            }
            
            renderContextUI();
        }

        function parseCurrentInput() {
            if (!currentInput || currentInput === "Error") return 0n;
            try {
                let cleanInput = currentInput.replace(/\s/g, ''); 
                let isNeg = cleanInput.startsWith('-');
                if (isNeg) cleanInput = cleanInput.substring(1);

                let val;
                if (activeBase === 16) val = BigInt("0x" + cleanInput);
                else if (activeBase === 2) val = BigInt("0b" + cleanInput);
                else val = BigInt(cleanInput);

                return isNeg ? -val : val;
            } catch (e) {
                return null;
            }
        }

        function formatBinary(binStr) {
            let padded = binStr.padStart(Math.ceil(binStr.length / 4) * 4, '0');
            return padded.match(/.{1,4}/g)?.join(' ') || '0000';
        }

        function updateDisplays(bigIntValue) {
            if (bigIntValue === null) {
                val16.innerText = "Error";
                val10.innerText = "Error";
                val2.innerText = "Error";
                return;
            }

            let isNeg = bigIntValue < 0n;
            let absVal = isNeg ? -bigIntValue : bigIntValue;

            val10.innerText = bigIntValue.toString(10);
            val16.innerText = (isNeg ? "-" : "") + absVal.toString(16).toUpperCase();
            val2.innerText = (isNeg ? "-" : "") + formatBinary(absVal.toString(2));
        }

        function inputChar(char) {
            if (waitingForNewInput) {
                currentInput = char;
                waitingForNewInput = false;
            } else {
                if (currentInput === "0") currentInput = char;
                else currentInput += char;
            }
            updateDisplays(parseCurrentInput());
            renderContextUI();
        }

        function deleteLast() {
            if (waitingForNewInput) return;
            currentInput = currentInput.slice(0, -1);
            if (currentInput === "" || currentInput === "-") currentInput = "0";
            updateDisplays(parseCurrentInput());
            renderContextUI();
        }

        function clearAll() {
            currentInput = "0";
            expression = [];
            waitingForNewInput = false;
            updateDisplays(0n);
            renderContextUI();
        }

        function setOp(op) {
            let currentVal = parseCurrentInput();
            if (currentVal === null) return;

            if (!waitingForNewInput) {
                expression.push(currentVal);
            } else if (expression.length > 0 && typeof expression[expression.length - 1] === 'string') {
                expression.pop();
            }
            
            expression.push(op);
            waitingForNewInput = true;
            renderContextUI();
        }

        function calculate() {
            if (expression.length === 0) return;
            
            let currentVal = parseCurrentInput();
            if (currentVal !== null && !waitingForNewInput) {
                expression.push(currentVal);
            }

            if (typeof expression[expression.length - 1] === 'string') {
                expression.pop();
            }

            try {
                let evalStr = expression.map(item => {
                    if (typeof item === 'bigint') {
                        return item < 0n ? `(${item.toString()}n)` : `${item.toString()}n`; 
                    }
                    return item;
                }).join(' ');

                let result = eval(evalStr);
                
                history.push({ expr: [...expression], res: result });
                if (history.length > 20) history.shift(); // Aumentado historial

                let isNeg = result < 0n;
                let absVal = isNeg ? -result : result;
                currentInput = absVal.toString(activeBase).toUpperCase();
                if (isNeg) currentInput = "-" + currentInput;

                expression = []; 
                updateDisplays(result);
                waitingForNewInput = true;
                
                renderContextUI();
            } catch (e) {
                clearAll();
                val10.innerText = "Error Expresión";
            }
        }
    </script>
</body>
</html>
